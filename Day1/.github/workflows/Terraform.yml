name: 'Terraform CI/CD'

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform Action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  contents: read

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    environment: production

    # Use these if you are using AWS
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    #   TF_WORKING_DIR: 'Day1'

    # defaults:
    #   run:
    #     working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
    # 1. Checkout the repository to the GitHub Actions runner
    - name: Checkout
      uses: actions/checkout@v4

    # 2. Install the preferred version of Terraform CLI 
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.7.0"

    # 3. Initialize a new or existing Terraform working directory
    - name: Terraform Init
      run: terraform init

    # 4. Generates an execution plan for Terraform
    - name: Terraform Plan
      run: terraform plan -input=false

    # 5. Terraform Apply or Destroy based on manual input
    # This step only runs if you trigger the workflow manually via 'workflow_dispatch'
    - name: Terraform Action
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.action != 'plan'
      run: terraform ${{ github.event.inputs.action }} -auto-approve -input=false
